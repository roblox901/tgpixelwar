<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controls { 
            margin: 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 10px; 
            background: #222;
            padding: 15px;
            border-radius: 10px;
        }
        .inputs { display: flex; gap: 8px; align-items: center; }
        input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 1px solid #444;
            background: #333;
            color: white;
            border-radius: 5px;
            text-align: center;
        }
        input[type="color"] { border: none; width: 40px; height: 40px; border-radius: 5px; cursor: pointer; }
        button {
            padding: 10px 20px;
            background-color: #2481cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        canvas { border: 2px solid #444; background-color: white; image-rendering: pixelated; max-width: 95vw; max-height: 50vh; }
    </style>
</head>
<body>
    <div id="controls">
        <div class="inputs">
            <label>X: <input type="number" id="coordX" min="0" max="299" value="150"></label>
            <label>Y: <input type="number" id="coordY" min="0" max="299" value="150"></label>
            <input type="color" id="colorPicker" value="#ff0000">
        </div>
        <button id="sendBtn">Поставить пиксель 🎨</button>
    </div>
    <canvas id="pixelCanvas" width="300" height="300"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const colorPicker = document.getElementById('colorPicker');
        const inputX = document.getElementById('coordX');
        const inputY = document.getElementById('coordY');
        const sendBtn = document.getElementById('sendBtn');

        sendBtn.addEventListener('click', () => {
            const x = parseInt(inputX.value);
            const y = parseInt(inputY.value);
            const color = colorPicker.value.replace('#', '');

            if (isNaN(x) || x < 0 || x >= 300 || isNaN(y) || y < 0 || y >= 300) {
                alert("Координаты должны быть от 0 до 299!");
                return;
            }

            // Шлем простую текстовую строку боту напрямую в чат
            const textData = `draw_${x}_${y}_${color}`;
            tg.sendData(textData); 
            tg.close();
        });
    </script>
</body>
</html>
