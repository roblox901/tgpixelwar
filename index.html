<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controls { margin: 15px; display: flex; align-items: center; gap: 5px; }
        canvas { border: 2px solid #444; background-color: white; image-rendering: pixelated; max-width: 95vw; max-height: 70vh; }
        input[type="color"] { border: none; width: 50px; height: 50px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="controls">
        <label>Цвет: <input type="color" id="colorPicker" value="#ff0000"></label>
    </div>
    <canvas id="pixelCanvas" width="300" height="300"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');

        // Загрузка карты из бесплатного облачного хранилища Telegram CloudStorage
        function loadMapFromCloud() {
            try {
                tg.CloudStorage.getItem('pixel_map_data', (err, value) => {
                    if (!err && value) {
                        const pixels = value.split('p');
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        pixels.forEach(p => {
                            if(!p) return;
                            const [x, y, color] = p.split('c');
                            if(x !== undefined && y !== undefined && color) {
                                ctx.fillStyle = '#' + color;
                                ctx.fillRect(parseInt(x), parseInt(y), 1, 1);
                            }
                        });
                    }
                });
            } catch (e) { console.error(e); }
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);
            const color = colorPicker.value;
            const cleanColor = color.replace('#', '');

            // 1. Рисуем у себя на экране
            ctx.fillStyle = color;
            ctx.fillRect(x, y, 1, 1);

            // 2. Дописываем точку в облачную историю Telegram CloudStorage, чтобы она не пропала
            tg.CloudStorage.getItem('pixel_map_data', (err, value) => {
                let currentData = value || "";
                if(currentData) currentData += 'p';
                currentData += `${x}c${y}c${cleanColor}`;
                
                tg.CloudStorage.setItem('pixel_map_data', currentData, (err, success) => {
                    // 3. Отправляем команду закрашивания нашему Python-боту на ПК
                    const textData = `draw_${x}_${y}_${color}`;
                    tg.sendData(textData); 
                    tg.close();
                });
            });
        });

        // Подгружаем сохраненный рисунок при старте
        loadMapFromCloud();
    </script>
</body>
</html>
