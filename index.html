<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #111; color: white; text-align: center; padding-top: 50px; }
        #controls { background: #222; padding: 20px; border-radius: 10px; display: inline-block; }
        .inputs { margin-bottom: 15px; }
        input[type="number"] { width: 60px; padding: 5px; margin: 0 5px; background: #333; color: white; border: 1px solid #444; text-align: center; }
        button { padding: 10px 20px; background: #2481cc; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="controls">
        <div class="inputs">
            X: <input type="number" id="coordX" value="150">
            Y: <input type="number" id="coordY" value="150">
            <input type="color" id="colorPicker" value="#ff0000">
        </div>
        <button id="sendBtn">Поставить пиксель 🎨</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SERVER_URL = "https://ngrok-free.dev"; 

        document.getElementById('sendBtn').addEventListener('click', async () => {
            const x = parseInt(document.getElementById('coordX').value);
            const y = parseInt(document.getElementById('coordY').value);
            const color = document.getElementById('colorPicker').value;

            try {
                const response = await fetch(`${SERVER_URL}/draw`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        "ngrok-skip-browser-warning": "true"
                    },
                    body: JSON.stringify({ 
                        user_id: tg.initDataUnsafe?.user?.id || 123, 
                        username: tg.initDataUnsafe?.user?.username || "Guest", 
                        x: x, 
                        y: y, 
                        color: color 
                    })
                });
                const resData = await response.json();
                alert("Ответ сервера: " + JSON.stringify(resData));
            } catch (e) { 
                alert("Ошибка отправки запроса: " + e); 
            }
        });
    </script>
</body>
</html>
