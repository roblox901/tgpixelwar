<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controls { 
            margin: 15px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            gap: 10px; 
            background: #222;
            padding: 15px;
            border-radius: 10px;
        }
        .inputs {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        input[type="number"] {
            width: 60px;
            padding: 6px;
            border: 1px solid #444;
            background: #333;
            color: white;
            border-radius: 5px;
            text-align: center;
        }
        input[type="color"] { border: none; width: 40px; height: 40px; border-radius: 5px; cursor: pointer; }
        button {
            padding: 10px 20px;
            background-color: #2481cc;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
        canvas { border: 2px solid #444; background-color: white; image-rendering: pixelated; max-width: 95vw; max-height: 50vh; }
    </style>
</head>
<body>
    <div id="controls">
        <div class="inputs">
            <label>X: <input type="number" id="coordX" min="0" max="299" value="150"></label>
            <label>Y: <input type="number" id="coordY" min="0" max="299" value="150"></label>
            <input type="color" id="colorPicker" value="#ff0000">
        </div>
        <button id="sendBtn">Поставить пиксель 🎨</button>
    </div>
    
    <canvas id="pixelCanvas" width="300" height="300"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const inputX = document.getElementById('coordX');
        const inputY = document.getElementById('coordY');
        const sendBtn = document.getElementById('sendBtn');

        // Отрисовка карты, переданной из бота
        function loadMapFromTelegram() {
            try {
                const mapDataRaw = tg.initDataUnsafe?.start_param;
                if (mapDataRaw) {
                    const pixels = decodeURIComponent(mapDataRaw).split('p');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    pixels.forEach(p => {
                        if(!p) return;
                        const [x, y, color] = p.split('c');
                        if(x !== undefined && y !== undefined && color) {
                            ctx.fillStyle = '#' + color;
                            ctx.fillRect(parseInt(x), parseInt(y), 1, 1);
                        }
                    });
                }
            } catch (e) { console.error(e); }
        }

        // Действие при нажатии на кнопку отправки
        sendBtn.addEventListener('click', () => {
            const x = parseInt(inputX.value);
            const y = parseInt(inputY.value);
            const color = colorPicker.value.replace('#', '');

            if (isNaN(x) || x < 0 || x >= 300 || isNaN(y) || y < 0 || y >= 300) {
                alert("Введите корректные координаты от 0 до 299!");
                return;
            }

            // Красим точку локально у себя на холсте
            ctx.fillStyle = '#' + color;
            ctx.fillRect(x, y, 1, 1);

            // Отправляем строку боту в чат
            const textData = `draw_${x}_${y}_${color}`;
            tg.sendData(textData); 
            tg.close();
        });

        loadMapFromTelegram();
    </script>
</body>
</html>
