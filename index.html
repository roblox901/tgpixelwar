<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #controls { margin: 15px; display: flex; align-items: center; gap: 5px; }
        canvas { border: 2px solid #444; background-color: white; image-rendering: pixelated; max-width: 95vw; max-height: 70vh; cursor: crosshair; }
        input[type="color"] { border: none; width: 50px; height: 50px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="controls">
        <label>Цвет: <input type="color" id="colorPicker" value="#ff0000"></label>
    </div>
    <canvas id="pixelCanvas" width="300" height="300"></canvas>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');

        const SERVER_URL = "https://ngrok-free.dev"; 

        const userId = tg.initDataUnsafe?.user?.id || 12345;
        const username = tg.initDataUnsafe?.user?.username || "Guest";

        async function fetchMap() {
            try {
                const response = await fetch(`${SERVER_URL}/get_map`, {
                    headers: { "ngrok-skip-browser-warning": "true" }
                });
                const data = await response.json();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (const key in data) {
                    const [x, y] = key.split(',').map(Number);
                    ctx.fillStyle = data[key];
                    ctx.fillRect(x, y, 1, 1);
                }
            } catch (e) { console.error("Ошибка обновления карты"); }
        }

        canvas.addEventListener('click', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);
            const color = colorPicker.value;

            try {
                const response = await fetch(`${SERVER_URL}/draw`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        "ngrok-skip-browser-warning": "true"
                    },
                    body: JSON.stringify({ user_id: userId, username: username, x: x, y: y, color: color })
                });
                const resData = await response.json();
                
                if (resData.status === "ok") {
                    ctx.fillStyle = color;
                    ctx.fillRect(x, y, 1, 1);
                } else {
                    alert(resData.message);
                }
            } catch (e) { alert("Кулдаун не прошел или сервер выключен"); }
        });

        setInterval(fetchMap, 2000);
        fetchMap();
    </script>
</body>
</html>
